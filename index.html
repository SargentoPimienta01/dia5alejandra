<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🐍 La Viborita de Regalos</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a0a2e;
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(120, 40, 200, 0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(255, 50, 100, 0.1) 0%, transparent 50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    min-height: 100vh;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    overflow: hidden;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
    padding: 8px;
  }

  #header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    max-width: 460px;
    padding: 6px 4px;
    margin-bottom: 4px;
  }

  .stat-box {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 14px;
    padding: 6px 14px;
    text-align: center;
    backdrop-filter: blur(6px);
  }

  .stat-label {
    font-size: 10px;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .stat-value {
    font-size: 22px;
    font-weight: 800;
    background: linear-gradient(135deg, #ff6bf5, #ffcc00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  #title {
    font-size: 15px;
    font-weight: 700;
    color: #fff;
    text-align: center;
    text-shadow: 0 0 20px rgba(255,107,245,0.5);
  }

  #title span { font-size: 20px; }

  #gameCanvas {
    border-radius: 16px;
    border: 2px solid rgba(255,255,255,0.1);
    box-shadow:
      0 0 40px rgba(120, 40, 200, 0.3),
      inset 0 0 60px rgba(0,0,0,0.3);
    display: block;
    background: #0d0618;
  }

  #progressBar {
    width: 100%;
    max-width: 460px;
    height: 8px;
    background: rgba(255,255,255,0.08);
    border-radius: 10px;
    margin: 6px 0;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.06);
  }

  #progressFill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #ff6bf5, #ffcc00, #00ffc8);
    border-radius: 10px;
    transition: width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 0 12px rgba(255,107,245,0.6);
  }

  #controls {
    display: grid;
    grid-template-areas:
      ". up ."
      "left down right";
    grid-template-columns: repeat(3, 72px);
    grid-template-rows: repeat(2, 72px);
    gap: 8px;
    margin-top: 10px;
    justify-content: center;
  }

  .ctrl-btn {
    width: 72px;
    height: 72px;
    border-radius: 18px;
    border: 1.5px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(8px);
    color: #fff;
    font-size: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.1s;
    -webkit-tap-highlight-color: transparent;
  }

  .ctrl-btn:active, .ctrl-btn.pressed {
    background: rgba(255,107,245,0.3);
    border-color: rgba(255,107,245,0.6);
    transform: scale(0.92);
    box-shadow: 0 0 20px rgba(255,107,245,0.3);
  }

  #btn-up { grid-area: up; }
  #btn-down { grid-area: down; }
  #btn-left { grid-area: left; }
  #btn-right { grid-area: right; }

  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(10, 4, 24, 0.92);
    backdrop-filter: blur(12px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 1;
    transition: opacity 0.3s;
  }

  #overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .overlay-icon {
    font-size: 64px;
    margin-bottom: 10px;
    animation: bounceIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes bounceIn {
    0% { transform: scale(0); }
    100% { transform: scale(1); }
  }

  .overlay-title {
    font-size: 32px;
    font-weight: 900;
    color: #fff;
    margin-bottom: 6px;
    text-align: center;
    text-shadow: 0 0 30px rgba(255,107,245,0.6);
  }

  .overlay-sub {
    font-size: 15px;
    color: rgba(255,255,255,0.55);
    margin-bottom: 24px;
    text-align: center;
    max-width: 300px;
    line-height: 1.5;
  }

  .play-btn {
    padding: 14px 48px;
    font-size: 18px;
    font-weight: 800;
    color: #fff;
    background: linear-gradient(135deg, #c840e9, #ff6bf5);
    border: none;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 4px 30px rgba(200, 64, 233, 0.5);
    transition: all 0.2s;
    letter-spacing: 0.5px;
    -webkit-tap-highlight-color: transparent;
  }

  .play-btn:active {
    transform: scale(0.95);
    box-shadow: 0 2px 15px rgba(200, 64, 233, 0.4);
  }

  .overlay-score {
    font-size: 14px;
    color: rgba(255,255,255,0.4);
    margin-top: 14px;
  }

  #speedIndicator {
    font-size: 10px;
    color: rgba(255,255,255,0.3);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  @media (max-height: 700px) {
    #controls {
      grid-template-columns: repeat(3, 60px);
      grid-template-rows: repeat(2, 60px);
      gap: 5px;
      margin-top: 6px;
    }
    .ctrl-btn { width: 60px; height: 60px; font-size: 24px; border-radius: 14px; }
  }

  @media (max-height: 600px) {
    #controls {
      grid-template-columns: repeat(3, 52px);
      grid-template-rows: repeat(2, 52px);
      gap: 4px;
      margin-top: 4px;
    }
    .ctrl-btn { width: 52px; height: 52px; font-size: 22px; border-radius: 12px; }
    .stat-value { font-size: 18px; }
  }
</style>
</head>
<body>

<div id="header">
  <div class="stat-box">
    <div class="stat-label">Regalos</div>
    <div class="stat-value" id="scoreDisplay">0</div>
  </div>
  <div id="title"><span>🐍</span> Viborita<br><span id="speedIndicator">Normal</span></div>
  <div class="stat-box">
    <div class="stat-label">Mejor</div>
    <div class="stat-value" id="bestDisplay">0</div>
  </div>
</div>

<canvas id="gameCanvas"></canvas>

<div id="progressBar"><div id="progressFill"></div></div>

<div id="controls">
  <button class="ctrl-btn" id="btn-up">▲</button>
  <button class="ctrl-btn" id="btn-left">◀</button>
  <button class="ctrl-btn" id="btn-down">▼</button>
  <button class="ctrl-btn" id="btn-right">▶</button>
</div>

<div id="overlay">
  <div class="overlay-icon">🎁🐍</div>
  <div class="overlay-title">Viborita de Regalos</div>
  <div class="overlay-sub">Recolecta <b>20 regalos</b> para ganar.<br>¡Cuidado con las paredes y tu propia cola!</div>
  <button class="play-btn" id="startBtn">🎮 ¡Jugar!</button>
  <div class="overlay-score" id="overlayScore"></div>
</div>

<script>
(() => {
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const scoreDisplay = document.getElementById('scoreDisplay');
  const bestDisplay = document.getElementById('bestDisplay');
  const progressFill = document.getElementById('progressFill');
  const overlay = document.getElementById('overlay');
  const overlayScore = document.getElementById('overlayScore');
  const startBtn = document.getElementById('startBtn');
  const speedIndicator = document.getElementById('speedIndicator');

  const GOAL = 20;
  const CELL = 20;
  let COLS, ROWS;
  let snake, dir, nextDir, food, score, best = 0;
  let gameLoop, speed, alive, started, particles;
  let foodAnim = 0;
  let foodEmoji;

  const GIFT_EMOJIS = ['🎁', '🎂', '🧁', '🎀', '🕯️', '🎈', '⭐', '🍰', '🎊', '💝'];

  function resize() {
    const maxW = Math.min(window.innerWidth - 16, 460);
    const maxH = Math.min(window.innerHeight * 0.48, 460);
    COLS = Math.floor(maxW / CELL);
    ROWS = Math.floor(maxH / CELL);
    if (COLS < 14) COLS = 14;
    if (ROWS < 14) ROWS = 14;
    canvas.width = COLS * CELL;
    canvas.height = ROWS * CELL;
    if (started && alive) draw();
  }

  window.addEventListener('resize', resize);
  resize();

  // Curva de dificultad recalibrada para 30 regalos:
  // 150ms (inicio) → 60ms (al llegar a 30). Decremento de 3ms por regalo.
  function getSpeedForScore(s) {
    const sp = Math.max(60, 150 - s * 3);
    return sp;
  }

  function getSpeedLabel(s) {
    if (s < 6) return '🟢 Fácil';
    if (s < 13) return '🟡 Normal';
    if (s < 21) return '🟠 Difícil';
    return '🔴 ¡Extremo!';
  }

  function spawnFood() {
    const occupied = new Set(snake.map(s => s.x + ',' + s.y));
    let pos;
    let attempts = 0;
    do {
      pos = {
        x: Math.floor(Math.random() * COLS),
        y: Math.floor(Math.random() * ROWS)
      };
      attempts++;
    } while (occupied.has(pos.x + ',' + pos.y) && attempts < 1000);
    food = pos;
    foodEmoji = GIFT_EMOJIS[Math.floor(Math.random() * GIFT_EMOJIS.length)];
    foodAnim = 0;
  }

  function spawnParticles(x, y) {
    const colors = ['#ff6bf5', '#ffcc00', '#00ffc8', '#ff4466', '#88aaff'];
    for (let i = 0; i < 12; i++) {
      const angle = (Math.PI * 2 / 12) * i + Math.random() * 0.5;
      const spd = 1.5 + Math.random() * 3;
      particles.push({
        x: x * CELL + CELL / 2,
        y: y * CELL + CELL / 2,
        vx: Math.cos(angle) * spd,
        vy: Math.sin(angle) * spd,
        life: 1,
        decay: 0.02 + Math.random() * 0.02,
        size: 2 + Math.random() * 3,
        color: colors[Math.floor(Math.random() * colors.length)]
      });
    }
  }

  function init() {
    const cx = Math.floor(COLS / 2);
    const cy = Math.floor(ROWS / 2);
    snake = [
      { x: cx, y: cy },
      { x: cx - 1, y: cy },
      { x: cx - 2, y: cy }
    ];
    dir = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    score = 0;
    alive = true;
    particles = [];
    speed = getSpeedForScore(0);
    scoreDisplay.textContent = '0';
    progressFill.style.width = '0%';
    speedIndicator.textContent = getSpeedLabel(0);
    spawnFood();
  }

  function update() {
    if (!alive) return;

    dir = { ...nextDir };
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    // Wall collision
    if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
      die();
      return;
    }

    // Self collision
    for (let i = 0; i < snake.length; i++) {
      if (snake[i].x === head.x && snake[i].y === head.y) {
        die();
        return;
      }
    }

    snake.unshift(head);

    // Eat food
    if (head.x === food.x && head.y === food.y) {
      score++;
      scoreDisplay.textContent = score;
      progressFill.style.width = Math.min(100, (score / GOAL) * 100) + '%';
      spawnParticles(food.x, food.y);
      speed = getSpeedForScore(score);
      speedIndicator.textContent = getSpeedLabel(score);

      if (score >= GOAL) {
        win();
        return;
      }

      spawnFood();
      clearInterval(gameLoop);
      gameLoop = setInterval(update, speed);
    } else {
      snake.pop();
    }

    foodAnim += 0.08;
    draw();
  }

  function die() {
    alive = false;
    clearInterval(gameLoop);

    // Death particles
    for (const seg of snake) {
      spawnParticles(seg.x, seg.y);
    }

    // Animate remaining particles then show overlay
    let frames = 0;
    const deathAnim = setInterval(() => {
      drawDeath();
      frames++;
      if (frames > 40) {
        clearInterval(deathAnim);
        showOverlay(false);
      }
    }, 30);
  }

  function win() {
    alive = false;
    clearInterval(gameLoop);
    showOverlay(true);
  }

  function showOverlay(won) {
    if (score > best) {
      best = score;
      bestDisplay.textContent = best;
    }

    const overlayIcon = overlay.querySelector('.overlay-icon');
    const overlayTitle = overlay.querySelector('.overlay-title');
    const overlaySub = overlay.querySelector('.overlay-sub');

    if (won) {
      overlayIcon.textContent = '🏆🎉';
      overlayTitle.textContent = '¡Ganaste!';
      overlayTitle.style.background = 'linear-gradient(135deg, #ffcc00, #00ffc8)';
      overlayTitle.style.webkitBackgroundClip = 'text';
      overlaySub.innerHTML = `Hoy hablemos de lo que duele. Perdonar es un acto doloroso porque significa renunciar a la dulce venganza de tener la razón. Perdonar duele porque es aceptar que la historia no se puede reescribir. Pero perdonar no es decir 'lo que hiciste estuvo bien'; perdonar es decir: 'Me niego a que esto siga dictando mi futuro'. El perdón es un regalo que te haces a ti mismo. Es el dolor de cortar la cadena que te ataba a quien te hirió. Hoy, suelta ese rencor que te está ocupando espacio en el pecho. No lo haces por ellos, lo haces para que tú puedas respirar hondo en tu próximo año de vida.✨`;
    } else {
      overlayIcon.textContent = '💀🎁';
      overlayTitle.textContent = '¡Game Over!';
      overlayTitle.style.background = 'linear-gradient(135deg, #ff4466, #ff6bf5)';
      overlayTitle.style.webkitBackgroundClip = 'text';
      overlaySub.innerHTML = `Recolectaste <b>${score} de ${GOAL}</b> regalos.<br>¡Inténtalo de nuevo!`;
    }

    overlayScore.textContent = `Mejor puntuación: ${best} 🏅`;
    startBtn.textContent = '🔄 Reiniciar';
    overlay.classList.remove('hidden');
  }

  function drawGrid() {
    ctx.fillStyle = '#0d0618';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.strokeStyle = 'rgba(255,255,255,0.025)';
    ctx.lineWidth = 0.5;
    for (let x = 0; x <= COLS; x++) {
      ctx.beginPath();
      ctx.moveTo(x * CELL, 0);
      ctx.lineTo(x * CELL, canvas.height);
      ctx.stroke();
    }
    for (let y = 0; y <= ROWS; y++) {
      ctx.beginPath();
      ctx.moveTo(0, y * CELL);
      ctx.lineTo(canvas.width, y * CELL);
      ctx.stroke();
    }
  }

  function drawSnake() {
    const len = snake.length;

    for (let i = len - 1; i >= 0; i--) {
      const seg = snake[i];
      const t = 1 - i / len;
      const r = Math.round(100 + 155 * t);
      const g = Math.round(50 + 57 * (1 - t));
      const b = Math.round(200 + 45 * t);
      const x = seg.x * CELL;
      const y = seg.y * CELL;
      const pad = i === 0 ? 1 : 2;
      const radius = i === 0 ? 6 : 4;

      // Glow for head
      if (i === 0) {
        ctx.shadowColor = `rgba(${r}, ${g}, ${b}, 0.6)`;
        ctx.shadowBlur = 12;
      }

      ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
      ctx.beginPath();
      ctx.roundRect(x + pad, y + pad, CELL - pad * 2, CELL - pad * 2, radius);
      ctx.fill();

      ctx.shadowColor = 'transparent';
      ctx.shadowBlur = 0;

      // Eyes on head
      if (i === 0) {
        ctx.fillStyle = '#fff';
        let ex1, ey1, ex2, ey2;
        const cx = x + CELL / 2;
        const cy = y + CELL / 2;

        if (dir.x === 1) { ex1 = cx + 3; ey1 = cy - 4; ex2 = cx + 3; ey2 = cy + 4; }
        else if (dir.x === -1) { ex1 = cx - 3; ey1 = cy - 4; ex2 = cx - 3; ey2 = cy + 4; }
        else if (dir.y === -1) { ex1 = cx - 4; ey1 = cy - 3; ex2 = cx + 4; ey2 = cy - 3; }
        else { ex1 = cx - 4; ey1 = cy + 3; ex2 = cx + 4; ey2 = cy + 3; }

        ctx.beginPath();
        ctx.arc(ex1, ey1, 2.2, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(ex2, ey2, 2.2, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#1a0a2e';
        ctx.beginPath();
        ctx.arc(ex1 + dir.x * 0.6, ey1 + dir.y * 0.6, 1, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(ex2 + dir.x * 0.6, ey2 + dir.y * 0.6, 1, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  function drawFood() {
    if (!food) return;
    const x = food.x * CELL + CELL / 2;
    const y = food.y * CELL + CELL / 2;

    // Pulsing glow
    const pulse = 0.5 + 0.5 * Math.sin(foodAnim * 3);
    const glowSize = 16 + pulse * 6;

    ctx.shadowColor = 'rgba(255, 204, 0, 0.5)';
    ctx.shadowBlur = glowSize;

    ctx.font = `${CELL - 2}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    const bobY = Math.sin(foodAnim * 2) * 1.5;
    ctx.fillText(foodEmoji, x, y + bobY);

    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0;
  }

  function drawParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.06;
      p.life -= p.decay;

      if (p.life <= 0) {
        particles.splice(i, 1);
        continue;
      }

      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function draw() {
    drawGrid();
    drawFood();
    drawSnake();
    drawParticles();

    // Border glow
    ctx.strokeStyle = alive ? 'rgba(255,107,245,0.15)' : 'rgba(255,50,50,0.3)';
    ctx.lineWidth = 2;
    ctx.strokeRect(0, 0, canvas.width, canvas.height);
  }

  function drawDeath() {
    drawGrid();
    drawParticles();
  }

  function setDirection(nx, ny) {
    // Prevent reversing
    if (dir.x === -nx && dir.y === -ny) return;
    if (nx !== 0 && dir.x === nx) return;
    if (ny !== 0 && dir.y === ny) return;
    nextDir = { x: nx, y: ny };
  }

  // Keyboard
  document.addEventListener('keydown', (e) => {
    switch (e.key) {
      case 'ArrowUp': case 'w': case 'W': e.preventDefault(); setDirection(0, -1); break;
      case 'ArrowDown': case 's': case 'S': e.preventDefault(); setDirection(0, 1); break;
      case 'ArrowLeft': case 'a': case 'A': e.preventDefault(); setDirection(-1, 0); break;
      case 'ArrowRight': case 'd': case 'D': e.preventDefault(); setDirection(1, 0); break;
    }
  });

  // Touch buttons
  const btnMap = {
    'btn-up': [0, -1], 'btn-down': [0, 1],
    'btn-left': [-1, 0], 'btn-right': [1, 0]
  };

  Object.entries(btnMap).forEach(([id, [dx, dy]]) => {
    const btn = document.getElementById(id);
    const handler = (e) => {
      e.preventDefault();
      btn.classList.add('pressed');
      setDirection(dx, dy);
      setTimeout(() => btn.classList.remove('pressed'), 120);
    };
    btn.addEventListener('touchstart', handler, { passive: false });
    btn.addEventListener('mousedown', handler);
  });

  // Swipe on canvas
  let touchStart = null;
  canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }, { passive: false });

  canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (!touchStart) return;
    const dx = e.touches[0].clientX - touchStart.x;
    const dy = e.touches[0].clientY - touchStart.y;
    const threshold = 20;

    if (Math.abs(dx) > threshold || Math.abs(dy) > threshold) {
      if (Math.abs(dx) > Math.abs(dy)) {
        setDirection(dx > 0 ? 1 : -1, 0);
      } else {
        setDirection(0, dy > 0 ? 1 : -1);
      }
      touchStart = null;
    }
  }, { passive: false });

  canvas.addEventListener('touchend', () => { touchStart = null; });

  // Prevent body scroll
  document.body.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

  // Start
  startBtn.addEventListener('click', () => {
    overlay.classList.add('hidden');
    init();
    started = true;
    draw();
    clearInterval(gameLoop);
    gameLoop = setInterval(update, speed);
  });

  // Initial draw
  bestDisplay.textContent = best;
  init();
  draw();

  // Animate food even when waiting
  let animFrame;
  function animLoop() {
    if (started && alive) {
      foodAnim += 0.05;
    }
    animFrame = requestAnimationFrame(animLoop);
  }
  animLoop();
})();
</script>
</body>
</html>
